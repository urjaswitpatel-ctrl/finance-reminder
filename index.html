<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>EMI Reminder</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>
        EMI Reminder System
      </h1>

      <p class="subtitle">
        Manage customer finance and EMI reminders
      </p>

      <div class="form-grid">

        <input type="text"
          id="name"
          placeholder="Customer Name">

        <input type="text"
          id="phone"
          placeholder="WhatsApp Number">

        <input type="text"
          id="product"
          placeholder="Product Name">

        <input type="number"
          id="productPrice"
          placeholder="Product Price">

        <input type="number"
          id="downPayment"
          placeholder="Down Payment">

        <input type="number"
          id="rate"
          placeholder="Interest Rate %">

        <input type="number"
          id="months"
          placeholder="Loan Duration (Months)">

        <input type="date"
          id="nextDate">

      </div>

      <button onclick="saveCustomer()">
        Save Customer
      </button>

      <div id="emiResult"></div>

    </div>

  </div>

  <script type="module"
    src="app.js"></script>

</body>

</html>
